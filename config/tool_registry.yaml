# OphAgent Tool Registry
# Each entry defines a tool's metadata, scheduling mode, and invocation config.
# scheduling_mode: "conda"  -> on-demand subprocess via Conda env
#                  "fastapi" -> pre-loaded Docker/FastAPI microservice
#                  "inline"  -> runs in the main process (no isolation needed)

tools:

  # -------------------------------------------------------------------------
  # REUSED MODELS
  # -------------------------------------------------------------------------

  fmue:
    name: "FMUE"
    description: "OCT B-scan classification for retinal layer diseases"
    modality: "OCT"
    task: "classification"
    scheduling_mode: "conda"
    conda_env: "fmue_env"
    entry_script: "tools/classification/oct_fmue.py"
    input_type: "image"
    output_type: "classification"
    model_weight: "models_weights/fmue/fmue_best.pth"
    labels: ["Normal", "AMD", "DME", "DRUSEN", "CNV"]
    newly_developed: false

  uwf_mdd:
    name: "UWF-MDD"
    description: "Ultra-widefield fundus multi-disease detection"
    modality: "UWF"
    task: "classification"
    scheduling_mode: "conda"
    conda_env: "uwf_mdd_env"
    entry_script: "tools/classification/uwf_mdd.py"
    input_type: "image"
    output_type: "classification"
    model_weight: "models_weights/uwf_mdd/uwf_mdd_best.pth"
    newly_developed: false

  uwf_multi_abnormality:
    name: "UWF Multi-Abnormality"
    description: "Ultra-widefield multi-abnormality screening"
    modality: "UWF"
    task: "multi_label_classification"
    scheduling_mode: "conda"
    conda_env: "uwf_multi_env"
    entry_script: "tools/classification/uwf_multi_abnormality.py"
    input_type: "image"
    output_type: "multi_label"
    model_weight: "models_weights/uwf_multi/uwf_multi_best.pth"
    newly_developed: false

  retizero:
    name: "RetiZero"
    description: "CFP CLIP model (English) for zero-shot retinal disease classification"
    modality: "CFP"
    task: "clip_zero_shot"
    scheduling_mode: "inline"
    entry_script: "tools/clip_models/retizero.py"
    input_type: "image"
    output_type: "zero_shot_classification"
    model_weight: "models_weights/retizero/retizero.pth"
    language: "en"
    newly_developed: false

  vilref:
    name: "ViLReF"
    description: "CFP CLIP model (Chinese) for zero-shot retinal disease classification"
    modality: "CFP"
    task: "clip_zero_shot"
    scheduling_mode: "inline"
    entry_script: "tools/clip_models/vilref.py"
    input_type: "image"
    output_type: "zero_shot_classification"
    model_weight: "models_weights/vilref/vilref.pth"
    language: "zh"
    newly_developed: false

  fundus_expert:
    name: "FundusExpert"
    description: "CFP VQA model for fundus image question answering"
    modality: "CFP"
    task: "vqa"
    scheduling_mode: "fastapi"
    fastapi_port: 8101
    entry_script: "tools/vqa/fundus_expert.py"
    input_type: "image+text"
    output_type: "text"
    model_weight: "models_weights/fundus_expert/"
    newly_developed: false

  vision_unite:
    name: "VisionUnite"
    description: "CFP VQA model for unified ophthalmic visual question answering"
    modality: "CFP"
    task: "vqa"
    scheduling_mode: "fastapi"
    fastapi_port: 8102
    entry_script: "tools/vqa/vision_unite.py"
    input_type: "image+text"
    output_type: "text"
    model_weight: "models_weights/vision_unite/"
    newly_developed: false

  automorph:
    name: "AutoMorph"
    description: "CFP retinal vasculature segmentation and morphological quantification"
    modality: "CFP"
    task: "segmentation"
    scheduling_mode: "conda"
    conda_env: "automorph_env"
    entry_script: "tools/segmentation/automorph.py"
    input_type: "image"
    output_type: "segmentation_mask+metrics"
    model_weight: "models_weights/automorph/"
    newly_developed: false

  retsam:
    name: "RetSAM"
    description: "CFP retinal structure segmentation via SAM adaptation"
    modality: "CFP"
    task: "segmentation"
    scheduling_mode: "inline"
    entry_script: "tools/segmentation/retsam.py"
    input_type: "image"
    output_type: "segmentation_mask"
    model_weight: "models_weights/retsam/retsam.pth"
    newly_developed: false

  # -------------------------------------------------------------------------
  # NEWLY DEVELOPED MODELS
  # -------------------------------------------------------------------------

  cfp_quality:
    name: "CFP Quality Reasoning"
    description: "CFP image quality assessment with reasoning explanation"
    modality: "CFP"
    task: "quality_assessment"
    scheduling_mode: "fastapi"
    fastapi_port: 8110
    entry_script: "tools/classification/cfp_quality.py"
    input_type: "image"
    output_type: "quality_score+reasoning"
    model_weight: "models_weights/cfp_quality/"
    newly_developed: true

  cfp_disease:
    name: "CFP Disease Classification"
    description: "Multiple retinal disease classification from CFP"
    modality: "CFP"
    task: "multi_label_classification"
    scheduling_mode: "fastapi"
    fastapi_port: 8111
    entry_script: "tools/classification/cfp_disease.py"
    input_type: "image"
    output_type: "multi_label"
    model_weight: "models_weights/cfp_disease/"
    newly_developed: true

  cfp_ffa_multimodal:
    name: "CFP+FFA Multimodal Classifier"
    description: "Joint CFP and FFA multimodal disease classification"
    modality: "CFP+FFA"
    task: "multimodal_classification"
    scheduling_mode: "fastapi"
    fastapi_port: 8112
    entry_script: "tools/classification/cfp_ffa_multimodal.py"
    input_type: "multi_image"
    output_type: "classification"
    model_weight: "models_weights/cfp_ffa_multimodal/"
    newly_developed: true

  uwf_quality_disease:
    name: "UWF Quality & Disease"
    description: "UWF image quality assessment and disease classification"
    modality: "UWF"
    task: "quality_and_classification"
    scheduling_mode: "fastapi"
    fastapi_port: 8113
    entry_script: "tools/classification/uwf_quality_disease.py"
    input_type: "image"
    output_type: "quality+classification"
    model_weight: "models_weights/uwf_quality_disease/"
    newly_developed: true

  cfp_glaucoma:
    name: "Referable Glaucoma & Structural Features"
    description: "Referable glaucoma detection with structural feature analysis"
    modality: "CFP"
    task: "glaucoma_detection"
    scheduling_mode: "fastapi"
    fastapi_port: 8114
    entry_script: "tools/classification/cfp_glaucoma.py"
    input_type: "image"
    output_type: "classification+structural_features"
    model_weight: "models_weights/cfp_glaucoma/"
    newly_developed: true

  cfp_pdr:
    name: "PDR Activity Grading"
    description: "Proliferative diabetic retinopathy activity grading"
    modality: "CFP"
    task: "grading"
    scheduling_mode: "fastapi"
    fastapi_port: 8115
    entry_script: "tools/classification/cfp_pdr.py"
    input_type: "image"
    output_type: "grade+probability"
    model_weight: "models_weights/cfp_pdr/"
    newly_developed: true

  ffa_lesion:
    name: "FFA Multi-Lesion Detection"
    description: "Multi-lesion detection in fluorescein angiography images"
    modality: "FFA"
    task: "detection"
    scheduling_mode: "fastapi"
    fastapi_port: 8120
    entry_script: "tools/detection/ffa_lesion.py"
    input_type: "image"
    output_type: "bounding_boxes+labels"
    model_weight: "models_weights/ffa_lesion/"
    newly_developed: true

  disc_fovea:
    name: "Optic Disc & Fovea Localisation"
    description: "Optic disc and fovea landmark localisation in CFP"
    modality: "CFP"
    task: "detection"
    scheduling_mode: "fastapi"
    fastapi_port: 8121
    entry_script: "tools/detection/disc_fovea.py"
    input_type: "image"
    output_type: "landmarks"
    model_weight: "models_weights/disc_fovea/"
    newly_developed: true

  # -------------------------------------------------------------------------
  # AUXILIARY TOOLS
  # -------------------------------------------------------------------------

  gradcam:
    name: "Grad-CAM"
    description: "Generate Grad-CAM saliency heatmaps for any CNN model"
    modality: "any"
    task: "explainability"
    scheduling_mode: "inline"
    entry_script: "tools/auxiliary/gradcam.py"
    input_type: "image+model"
    output_type: "heatmap"
    newly_developed: false

  roi_cropping:
    name: "ROI Cropping"
    description: "Crop region of interest from fundus images"
    modality: "any"
    task: "preprocessing"
    scheduling_mode: "inline"
    entry_script: "tools/auxiliary/roi_cropping.py"
    input_type: "image+coordinates"
    output_type: "image"
    newly_developed: false

  ocr_detector:
    name: "OCR Text Detector"
    description: "Extract text from images using OCR"
    modality: "any"
    task: "ocr"
    scheduling_mode: "inline"
    entry_script: "tools/auxiliary/ocr_detector.py"
    input_type: "image"
    output_type: "text"
    newly_developed: false

  web_search:
    name: "Web/Literature Search"
    description: "Search PubMed and arXiv for ophthalmology literature"
    modality: "text"
    task: "search"
    scheduling_mode: "inline"
    entry_script: "tools/auxiliary/web_search.py"
    input_type: "text"
    output_type: "text"
    newly_developed: false
